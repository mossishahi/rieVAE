# ISO-architecture training plan defaults.
# These match the paper Algorithm (method_overview.tex Sec. 4-5):
#   - decoder_lr_scale = 0.1  (two-timescale; decoder 10x slower)
#   - grad_clip_norm   = 1.0  (global L2-norm clip)
#   - weight_decay     = 1e-4 (AdamW decoupled weight decay)
_target_: rieVAE.training.IsoTrainingPlan
beta:                 0.01
beta_min:             0.0
beta_linear_decay_on: false
gamma_max:            1.0
gamma_sigmoid_k:      8.0
gamma_sigmoid_center: 0.2
learning_rate:        1.0e-3
weight_decay:         1.0e-4
decoder_lr_scale:     0.1
grad_clip_norm:       1.0
lr_scheduler:         null
lr_min:               1.0e-6
lr_warmup_steps:      0
use_initial_scale_norm: true
scale_eps:            1.0e-6
